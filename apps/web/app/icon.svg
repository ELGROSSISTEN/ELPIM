<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca">
        <animate attributeName="stop-color"
          values="#4338ca;#312e81;#4c1d95;#4338ca"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1e1b4b">
        <animate attributeName="stop-color"
          values="#1e1b4b;#3730a3;#1e1b4b"
          dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Orbit track -->
  <circle cx="16" cy="16" r="11.5"
    fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.75"/>

  <!-- Comet tail — farthest -->
  <circle cx="16" cy="4.5" r="1">
    <animate attributeName="fill" values="rgba(199,210,254,0.2);rgba(199,210,254,0.3);rgba(199,210,254,0.2)" dur="1.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate"
      from="-48 16 16" to="312 16 16" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Comet tail — mid -->
  <circle cx="16" cy="4.5" r="1.7" fill="rgba(165,180,252,0.55)">
    <animateTransform attributeName="transform" type="rotate"
      from="-26 16 16" to="334 16 16" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Main orbiting dot -->
  <circle cx="16" cy="4.5" r="3" fill="white">
    <animateTransform attributeName="transform" type="rotate"
      from="0 16 16" to="360 16 16" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- "e" lettermark -->
  <text x="16" y="22"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18" font-weight="700"
    text-anchor="middle"
    fill="white" opacity="0.97">e</text>
</svg>
