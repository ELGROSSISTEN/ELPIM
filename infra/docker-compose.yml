version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: epim-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: epim
    ports:
      - '5432:5432'
    volumes:
      - epim-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d epim']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: epim-redis
    ports:
      - '6379:6379'
    command: redis-server --save '' --appendonly no
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  epim-postgres-data:
