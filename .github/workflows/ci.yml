name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elpim
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d elpim"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elpim
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_123456789
      MASTER_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SHOPIFY_WEBHOOK_SECRET: ci_webhook_secret
      SHOPIFY_WEBHOOK_CALLBACK_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Build packages
        run: pnpm --filter @epim/db build && pnpm --filter @epim/shared build && pnpm --filter @epim/crypto build && pnpm --filter @epim/shopify build

      - name: Prisma push schema
        run: pnpm --filter @epim/db exec prisma db push --skip-generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test
